<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Disable Zoom Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Zoom Locker</h2>
    <div class="status-box">
      <p id="current-domain">Loading domain...</p>
    </div>
    
    <div class="actions">
      <button id="btn-toggle-domain" class="btn">
        <span class="btn-text" id="text-toggle-domain">Block zoom on page</span>
      </button>
      
      <button id="btn-toggle-all" class="btn">
        <span class="btn-text" id="text-toggle-all">Block on all pages</span>
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
